<VirtualHost *:80>
    ServerAdmin admin@example.com
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted

        # FollowSymLinks は rewrite 用
        # -Indexes を付けてディレクトリ一覧表示を防止
        # Apacheの仕様: Options は「全部+/-付き」または「全部プレーン」で統一が必要
        Options +FollowSymLinks -Indexes
    </Directory>

    # ログ（n-system用に名称変更）
    ErrorLog ${APACHE_LOG_DIR}/nsystem-error.log
    CustomLog ${APACHE_LOG_DIR}/nsystem-access.log combined

    # ------------------------------------------------------------
    # セキュリティ系ヘッダ
    # ------------------------------------------------------------
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ※X-XSS-Protection は現行ブラウザでは非推奨/無視されがちだが、互換目的で残すならOK
    Header always set X-XSS-Protection "1; mode=block"

    # ------------------------------------------------------------
    # CSP（Content-Security-Policy）
    # ------------------------------------------------------------
    # 目的:
    # - K-Coreの layout.php / common.js / DataTables / Bootstrap / jQuery / FontAwesome / Google Fonts
    # - zipcloud への fetch を許可（郵便番号→住所補完）
    #
    # 注意:
    # - DataTables/Bootstrap のCDN利用のため script-src/style-src に許可を付与
    # - inline script（DT checkログ等）を使う場合 'unsafe-inline' が必要
    # - 今後 inline を無くせるなら 'unsafe-inline' は削除推奨
    #
    Header always set Content-Security-Policy "default-src 'self'; \
        base-uri 'self'; \
        frame-ancestors 'self'; \
        form-action 'self'; \
        object-src 'none'; \
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://code.jquery.com https://cdnjs.cloudflare.com; \
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://cdnjs.cloudflare.com; \
        font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com data:; \
        img-src 'self' data: blob: https://cdn.jsdelivr.net; \
        connect-src 'self' https://zipcloud.ibsnet.co.jp https://cdn.jsdelivr.net https://code.jquery.com;"

</VirtualHost>
